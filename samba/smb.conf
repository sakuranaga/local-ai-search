[global]
server string = LAS File Server
server min protocol = SMB3
smb encrypt = desired
security = user
map to guest = never
log level = 1
max log size = 1000

# Authentication: tdbsam with password sync from LAS backend
passdb backend = tdbsam
obey pam restrictions = no

# Charset
unix charset = UTF-8
dos charset = CP932

# Performance
socket options = TCP_NODELAY IPTOS_LOWDELAY
read raw = yes
write raw = yes
use sendfile = yes
aio read size = 16384
aio write size = 16384

# macOS compatibility
vfs objects = fruit streams_xattr
fruit:metadata = stream
fruit:model = MacSamba
fruit:nfs_aces = no

[LAS]
path = /share-base/fs
browseable = yes
read only = yes
admin users = @las_admins
