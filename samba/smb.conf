[global]
server string = LAS File Server
server min protocol = SMB3
smb encrypt = desired
security = user
map to guest = never
log level = 1
max log size = 1000

passdb backend = tdbsam
obey pam restrictions = no

unix charset = UTF-8
dos charset = CP932

socket options = TCP_NODELAY IPTOS_LOWDELAY
read raw = yes
write raw = yes
use sendfile = yes
aio read size = 16384
aio write size = 16384

# macOS compatibility (no streams_xattr — FUSE doesn't support named streams)
vfs objects = fruit
fruit:metadata = netatalk
fruit:model = MacSamba
fruit:nfs_aces = no
fruit:resource = file
fruit:encoding = native

[LAS]
path = /share-base/fs
browseable = yes
read only = no
admin users = @las_admins
# FUSE doesn't generate inotify events, so disable change notify
# to force clients to poll for directory changes
change notify = no
