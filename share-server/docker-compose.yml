services:
  share:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      SHARE_PORT: "8080"
      SHARE_DATA_DIR: /data
      SHARE_BASE_URL: ${SHARE_BASE_URL:-http://localhost:8080}
      SHARE_JWT_SECRET: ${SHARE_JWT_SECRET:-changeme}
      SHARE_MAX_FILE_SIZE_MB: ${SHARE_MAX_FILE_SIZE_MB:-500}
