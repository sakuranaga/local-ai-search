<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Filename}} - LAS Share</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fafafa; color: #333; }
    .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 48px 32px; text-align: center; max-width: 420px; width: 100%; margin: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 18px; margin-bottom: 8px; word-break: break-all; }
    .meta { color: #888; font-size: 13px; margin-bottom: 4px; }
    .badge { display: inline-block; border: 1px solid #ddd; border-radius: 4px; padding: 2px 8px; font-size: 11px; color: #666; margin: 8px 0 24px; }
    .btn { display: inline-block; padding: 14px 32px; background: #333; color: #fff; border-radius: 8px; text-decoration: none; font-size: 15px; transition: background 0.2s; }
    .btn:hover { background: #555; }
    .footer { margin-top: 48px; color: #bbb; font-size: 11px; }
    @media (prefers-color-scheme: dark) {
      body { background: #111; color: #eee; }
      .card { background: #1a1a1a; border-color: #333; }
      .meta { color: #999; }
      .badge { border-color: #444; color: #aaa; }
      .btn { background: #eee; color: #111; }
      .btn:hover { background: #ccc; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📄</div>
    <h1>{{.Filename}}</h1>
    <p class="meta">共有者: {{.CreatedBy}}</p>
    <p class="meta">有効期限: {{.ExpiresAt}}</p>
    <p class="meta">サイズ: {{.FileSize}}</p>
    <div class="badge">{{.FileType}}</div>
    <div>
      <a href="/s/{{.Token}}/download" class="btn">⬇ ダウンロード</a>
    </div>
    <p class="footer">Powered by LAS</p>
  </div>
</body>
</html>
