<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>エラー - LAS Share</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fafafa; color: #333; }
    .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 48px 32px; text-align: center; max-width: 380px; width: 100%; margin: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 16px; color: #666; }
    .footer { margin-top: 48px; color: #bbb; font-size: 11px; }
    @media (prefers-color-scheme: dark) {
      body { background: #111; color: #eee; }
      .card { background: #1a1a1a; border-color: #333; }
      h1 { color: #aaa; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⚠️</div>
    <h1>{{.Message}}</h1>
    <p class="footer">Powered by LAS</p>
  </div>
</body>
</html>
