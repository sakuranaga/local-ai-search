<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>パスワード確認 - LAS Share</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fafafa; color: #333; }
    .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 48px 32px; text-align: center; max-width: 380px; width: 100%; margin: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .icon { font-size: 48px; margin-bottom: 16px; }
    p { color: #888; font-size: 14px; margin-bottom: 20px; }
    .error { color: #e53e3e; font-size: 13px; margin-bottom: 12px; }
    form { display: flex; gap: 8px; }
    input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
    input:focus { border-color: #333; }
    button { padding: 10px 20px; background: #333; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
    button:hover { background: #555; }
    .footer { margin-top: 48px; color: #bbb; font-size: 11px; }
    @media (prefers-color-scheme: dark) {
      body { background: #111; color: #eee; }
      .card { background: #1a1a1a; border-color: #333; }
      input { background: #222; border-color: #444; color: #eee; }
      input:focus { border-color: #aaa; }
      button { background: #eee; color: #111; }
      button:hover { background: #ccc; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔒</div>
    <p>この共有リンクはパスワードで保護されています</p>
    {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
    <form method="POST" action="/s/{{.Token}}/verify">
      <input type="password" name="password" placeholder="パスワード" required autofocus>
      <button type="submit">開く</button>
    </form>
    <p class="footer">Powered by LAS</p>
  </div>
</body>
</html>
