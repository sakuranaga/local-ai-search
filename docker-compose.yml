services:
  db:
    build: ./db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: las
      POSTGRES_USER: las
    volumes:
      - las_db:/var/lib/postgresql
      - ./db/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U las -d las"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    volumes:
      - las_redis:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://las:${POSTGRES_PASSWORD}@db:5432/las
      REDIS_URL: redis://redis:6379/0
      STORAGE_PATH: /data/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/data/storage
      - ./data/smb-sync:/smb-sync
      - .:/host/project:ro
    # ports:
    #   - "8000:8000"
    command: >
      gunicorn app.main:app
      --worker-class uvicorn.workers.UvicornWorker
      --workers 4
      --bind 0.0.0.0:8000
      --timeout 300
      --graceful-timeout 30

  queue-worker:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://las:${POSTGRES_PASSWORD}@db:5432/las
      STORAGE_PATH: /data/storage
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/data/storage
    command: python -u -m app.worker --concurrency 2 --poll-interval 1.0

  clamav:
    image: clamav/clamav:latest
    restart: unless-stopped
    volumes:
      - clamav_data:/var/lib/clamav
      - ./data:/data/storage:ro
    healthcheck:
      test: ["CMD", "clamdcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  tusd:
    image: tusproject/tusd:latest
    restart: unless-stopped
    command:
      - -hooks-http=http://backend:8000/api/ingest/tus-hook
      - -hooks-enabled-events=pre-create,post-finish
      - -upload-dir=/data/uploads/tus
      - -behind-proxy
      - -base-path=/tusd/
    volumes:
      - ./data/uploads/tus:/data/uploads/tus
    depends_on:
      - backend

  y-websocket:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npx y-websocket@2"
    environment:
      HOST: 0.0.0.0
      PORT: "1234"
      YPERSISTENCE: /data/yjs-leveldb
    volumes:
      - yjs_data:/data/yjs-leveldb
    expose:
      - "1234"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
      - tusd
      - y-websocket
      - collabora
    ports:
      - "3002:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro

  collabora:
    image: collabora/code
    restart: unless-stopped
    environment:
      - aliasgroup1=http://backend:8000
      - extra_params=--o:ssl.enable=false --o:ssl.termination=true
      - "dictionaries="
    cap_add:
      - MKNOD

  # --- SMB File Sharing ---

  las-fuse:
    build: ./backend
    restart: unless-stopped
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://las:${POSTGRES_PASSWORD}@db:5432/las
      STORAGE_PATH: /data/storage
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data/fuse-mount:/mnt/base:rshared
      - ./data:/data/storage
      - ./data/smb-staging:/data/smb-staging
    command: >
      sh -c "fusermount3 -uz /mnt/base/fs 2>/dev/null || true;
             rm -rf /mnt/base/fs 2>/dev/null || true;
             mkdir -p /mnt/base/fs;
             exec python -u -m app.fuse_server --mountpoint /mnt/base/fs"
    healthcheck:
      test: ["CMD", "stat", "/mnt/base/fs/.healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 5

  samba:
    build: ./samba
    restart: unless-stopped
    env_file: .env
    environment:
      SMB_INTERNAL_KEY: ${SMB_INTERNAL_KEY:-}
    ports:
      - "${SMB_PORT:-445}:445"
    depends_on:
      las-fuse:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ./data/fuse-mount:/share-base:rslave
      - ./data/smb-sync:/smb-sync
      - samba_data:/var/lib/samba

volumes:
  las_db:
  las_redis:
  clamav_data:
  yjs_data:
  samba_data:
