services:
  db:
    build: ./db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: las
      POSTGRES_USER: las
    volumes:
      - las_db:/var/lib/postgresql
      - ./db/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U las -d las"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - las_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://las:${POSTGRES_PASSWORD}@db:5432/las
      REDIS_URL: redis://redis:6379/0
      STORAGE_PATH: /data/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/data/storage
      - .:/host/project:ro
    # ports:
    #   - "8000:8000"
    command: >
      gunicorn app.main:app
      --worker-class uvicorn.workers.UvicornWorker
      --workers 4
      --bind 0.0.0.0:8000
      --timeout 300
      --graceful-timeout 30

  clamav:
    image: clamav/clamav:latest
    restart: unless-stopped
    volumes:
      - clamav_data:/var/lib/clamav
      - ./data:/data/storage:ro
    healthcheck:
      test: ["CMD", "clamdcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  tusd:
    image: tusproject/tusd:latest
    restart: unless-stopped
    command:
      - -hooks-http=http://backend:8000/api/ingest/tus-hook
      - -hooks-enabled-events=pre-create,post-finish
      - -upload-dir=/data/uploads/tus
      - -behind-proxy
      - -base-path=/tusd/
    volumes:
      - ./data/uploads/tus:/data/uploads/tus
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
      - tusd
    ports:
      - "3002:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro

volumes:
  las_db:
  las_redis:
  clamav_data:
