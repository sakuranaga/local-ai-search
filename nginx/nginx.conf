worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;

    keepalive_timeout 65;

    # Allow large file uploads (images, PDFs, etc.)
    client_max_body_size 50m;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Detect real scheme from upstream proxy (cloudflared, etc.)
    # Falls back to $scheme if X-Forwarded-Proto is not set
    map $http_x_forwarded_proto $real_scheme {
        default $scheme;
        https   https;
        http    http;
    }

    # Share-only server (las-share.ddr8.com)
    # Only /s/{token} and /api/share/ are accessible — no login, no main app
    server {
        listen 80;
        server_name las-share.ddr8.com;

        root /usr/share/nginx/html;

        # Share page SPA
        location /s/ {
            try_files /index.html =404;
        }

        # Share API (public endpoints)
        location /api/share/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
            proxy_buffering off;
        }

        # Static assets (JS, CSS, fonts)
        location /assets/ {
            try_files $uri =404;
        }

        # Everything else → 404
        location / {
            default_type "text/html; charset=utf-8";
            return 404 '<html><body><p style="text-align:center;margin-top:40vh;color:#888">ページが見つかりません</p></body></html>';
        }
    }

    # Main app server (default)
    server {
        listen 80 default_server;
        server_name _;

        # Frontend static files
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri.html $uri/ /index.html;
        }

        # Share page (also works on main domain)
        location /s/ {
            try_files /index.html =404;
        }

        # tus upload proxy
        location /tusd/ {
            proxy_pass http://tusd:8080;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
            proxy_set_header X-Forwarded-Host  $host;

            # tus headers
            proxy_set_header Upload-Length     $http_upload_length;
            proxy_set_header Upload-Offset    $http_upload_offset;
            proxy_set_header Tus-Resumable    $http_tus_resumable;
            proxy_set_header Upload-Metadata  $http_upload_metadata;

            # Rewrite Location header from http to https when behind TLS proxy
            proxy_redirect ~^http://(.+)$ $real_scheme://$1;

            # Large file support
            client_max_body_size 0;
            proxy_request_buffering off;
            proxy_buffering off;
            proxy_read_timeout 600s;
        }

        # API proxy
        location /api/ {
            proxy_pass http://backend:8000;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;

            # SSE support
            proxy_buffering off;
            proxy_cache     off;
            proxy_read_timeout 300s;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
