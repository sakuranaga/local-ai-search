worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;

    keepalive_timeout 65;

    # Allow large file uploads (images, PDFs, etc.)
    client_max_body_size 50m;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Detect real scheme from upstream proxy (cloudflared, etc.)
    # Falls back to $scheme if X-Forwarded-Proto is not set
    map $http_x_forwarded_proto $real_scheme {
        default $scheme;
        https   https;
        http    http;
    }

    # Main app server
    server {
        listen 80;
        server_name _;

        # Frontend static files
        root /usr/share/nginx/html;
        index index.html;

        # Hashed assets — cache aggressively
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # index.html — never cache (so new builds take effect immediately)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires 0;
        }

        location / {
            try_files $uri $uri.html $uri/ /index.html;
        }

        # tus upload proxy
        location /tusd/ {
            proxy_pass http://tusd:8080;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
            proxy_set_header X-Forwarded-Host  $host;

            # tus headers
            proxy_set_header Upload-Length     $http_upload_length;
            proxy_set_header Upload-Offset    $http_upload_offset;
            proxy_set_header Tus-Resumable    $http_tus_resumable;
            proxy_set_header Upload-Metadata  $http_upload_metadata;

            # Rewrite Location header from http to https when behind TLS proxy
            proxy_redirect ~^http://(.+)$ $real_scheme://$1;

            # Large file support
            client_max_body_size 0;
            proxy_request_buffering off;
            proxy_buffering off;
            proxy_read_timeout 600s;
        }

        # Yjs WebSocket proxy (collaborative editing)
        location /yjs/ {
            proxy_pass http://y-websocket:1234/;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400s;
        }

        # Collabora Online (WOPI client)
        location ^~ /browser {
            proxy_pass http://collabora:9980;
            proxy_set_header Host $http_host;
        }

        location ^~ /hosting/discovery {
            proxy_pass http://collabora:9980;
            proxy_set_header Host $http_host;
        }

        location ^~ /hosting/capabilities {
            proxy_pass http://collabora:9980;
            proxy_set_header Host $http_host;
        }

        location ~ ^/cool/(.*)/ws$ {
            proxy_pass http://collabora:9980;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_read_timeout 36000s;
        }

        location ~ ^/(cool|lool)/ {
            proxy_pass http://collabora:9980;
            proxy_set_header Host $http_host;
        }

        # API proxy
        location /api/ {
            proxy_pass http://backend:8000;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;

            # SSE support
            proxy_buffering off;
            proxy_cache     off;
            proxy_read_timeout 300s;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
